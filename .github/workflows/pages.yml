name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Visual Site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build site directory
        run: |
          mkdir -p _site
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Memory-Spark | RAG Pipeline Visualized</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              
              :root {
                --bg-dark: #0d1117;
                --bg-card: #161b22;
                --fg: #c9d1d9;
                --accent: #58a6ff;
                --accent-green: #3fb950;
                --accent-orange: #d29922;
                --accent-purple: #a371f7;
                --border: #30363d;
              }
              
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                background: var(--bg-dark);
                color: var(--fg);
                min-height: 100vh;
                overflow-x: hidden;
              }
              
              .hero {
                text-align: center;
                padding: 60px 20px 40px;
              }
              
              .hero h1 {
                font-size: 3.5rem;
                background: linear-gradient(135deg, var(--accent), var(--accent-purple));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                margin-bottom: 16px;
              }
              
              .hero p {
                font-size: 1.25rem;
                color: #8b949e;
                max-width: 600px;
                margin: 0 auto;
              }
              
              .stats {
                display: flex;
                justify-content: center;
                gap: 40px;
                margin-top: 40px;
                flex-wrap: wrap;
              }
              
              .stat {
                text-align: center;
              }
              
              .stat-value {
                font-size: 2.5rem;
                font-weight: bold;
                color: var(--accent-green);
              }
              
              .stat-label {
                color: #8b949e;
                font-size: 0.9rem;
              }
              
              .pipeline-container {
                padding: 60px 20px;
                max-width: 1400px;
                margin: 0 auto;
              }
              
              .pipeline-title {
                text-align: center;
                font-size: 2rem;
                margin-bottom: 60px;
              }
              
              .pipeline {
                position: relative;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 20px;
              }
              
              .stage-row {
                display: flex;
                gap: 20px;
                justify-content: center;
                flex-wrap: wrap;
              }
              
              .stage {
                background: var(--bg-card);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 20px;
                width: 180px;
                text-align: center;
                position: relative;
                transition: all 0.3s ease;
                opacity: 0;
                transform: translateY(20px);
              }
              
              .stage.visible {
                opacity: 1;
                transform: translateY(0);
              }
              
              .stage:hover {
                    border-color: var(--accent);
                    transform: translateY(-4px);
                    box-shadow: 0 8px 30px rgba(88, 166, 255, 0.15);
              }
              
              .stage-number {
                position: absolute;
                top: -12px;
                left: 50%;
                transform: translateX(-50%);
                background: var(--accent);
                color: white;
                width: 24px;
                height: 24px;
                border-radius: 50%;
                font-size: 12px;
                font-weight: bold;
                display: flex;
                align-items: center;
                justify-content: center;
              }
              
              .stage-icon {
                font-size: 2rem;
                margin-bottom: 8px;
              }
              
              .stage-name {
                font-weight: 600;
                margin-bottom: 4px;
              }
              
              .stage-desc {
                font-size: 0.75rem;
                color: #8b949e;
              }
              
              .connector {
                position: relative;
                height: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
              }
              
              .connector::before {
                content: '';
                position: absolute;
                width: 2px;
                height: 100%;
                background: linear-gradient(to bottom, var(--accent), transparent);
                animation: flow 2s infinite;
              }
              
              @keyframes flow {
                0%, 100% { opacity: 0.3; }
                50% { opacity: 1; }
              }
              
              .arrow {
                color: var(--accent);
                font-size: 1.5rem;
                animation: pulse 1.5s infinite;
              }
              
              @keyframes pulse {
                0%, 100% { transform: scale(1); opacity: 0.7; }
                50% { transform: scale(1.2); opacity: 1; }
              }
              
              .gate-section {
                background: linear-gradient(135deg, rgba(210, 153, 34, 0.1), transparent);
                border: 1px solid var(--accent-orange);
                border-radius: 16px;
                padding: 30px;
                margin: 40px 0;
                max-width: 800px;
                margin-left: auto;
                margin-right: auto;
              }
              
              .gate-title {
                color: var(--accent-orange);
                font-size: 1.5rem;
                margin-bottom: 20px;
                display: flex;
                align-items: center;
                gap: 10px;
              }
              
              .gate-logic {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
              }
              
              .gate-condition {
                background: var(--bg-card);
                border-radius: 8px;
                padding: 15px;
                text-align: center;
              }
              
              .gate-condition .condition {
                font-family: monospace;
                font-size: 1.1rem;
                color: var(--accent-orange);
                margin-bottom: 8px;
              }
              
              .gate-condition .action {
                font-size: 0.85rem;
                color: #8b949e;
              }
              
              .fusion-section {
                margin: 60px 0;
              }
              
              .fusion-formula {
                background: var(--bg-card);
                border-radius: 12px;
                padding: 30px;
                text-align: center;
                max-width: 600px;
                margin: 20px auto;
              }
              
              .formula {
                font-family: 'Times New Roman', serif;
                font-size: 1.5rem;
                color: var(--accent);
                margin: 20px 0;
              }
              
              .formula-desc {
                color: #8b949e;
                font-size: 0.9rem;
              }
              
              .architecture {
                padding: 60px 20px;
                max-width: 1200px;
                margin: 0 auto;
              }
              
              .arch-title {
                text-align: center;
                font-size: 2rem;
                margin-bottom: 40px;
              }
              
              .arch-diagram {
                display: grid;
                grid-template-columns: 1fr 2fr 1fr;
                gap: 30px;
                align-items: center;
              }
              
              @media (max-width: 900px) {
                .arch-diagram {
                  grid-template-columns: 1fr;
                }
              }
              
              .arch-box {
                background: var(--bg-card);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 20px;
              }
              
              .arch-box.highlight {
                border-color: var(--accent);
                background: linear-gradient(135deg, rgba(88, 166, 255, 0.1), transparent);
              }
              
              .arch-label {
                font-weight: 600;
                margin-bottom: 10px;
                color: var(--accent);
              }
              
              .arch-items {
                font-size: 0.85rem;
                color: #8b949e;
              }
              
              .arch-items li {
                margin: 5px 0;
                list-style: none;
              }
              
              .arrow-horizontal {
                text-align: center;
                font-size: 2rem;
                color: var(--accent);
              }
              
              .footer {
                text-align: center;
                padding: 40px 20px;
                border-top: 1px solid var(--border);
                margin-top: 60px;
              }
              
              .footer-links {
                display: flex;
                justify-content: center;
                gap: 30px;
                flex-wrap: wrap;
              }
              
              .footer-link {
                display: flex;
                align-items: center;
                gap: 8px;
                background: var(--bg-card);
                border: 1px solid var(--border);
                padding: 12px 24px;
                border-radius: 8px;
                color: var(--fg);
                text-decoration: none;
                transition: all 0.3s ease;
              }
              
              .footer-link:hover {
                border-color: var(--accent);
                transform: translateY(-2px);
              }
              
              .scroll-indicator {
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: var(--accent);
                color: white;
                width: 50px;
                height: 50px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                opacity: 0;
                transition: opacity 0.3s;
                cursor: pointer;
              }
              
              .scroll-indicator.visible {
                opacity: 1;
              }
            </style>
          </head>
          <body>
            <section class="hero">
              <h1>Memory-Spark</h1>
              <p>A 15-stage RAG pipeline achieving SOTA-level retrieval with 50% lower latency through dynamic reranker gating</p>
              
              <div class="stats">
                <div class="stat">
                  <div class="stat-value">78.9%</div>
                  <div class="stat-label">NDCG@10 (SciFact)</div>
                </div>
                <div class="stat">
                  <div class="stat-value">626ms</div>
                  <div class="stat-label">P50 Latency</div>
                </div>
                <div class="stat">
                  <div class="stat-value">78%</div>
                  <div class="stat-label">Reranker Skip Rate</div>
                </div>
                <div class="stat">
                  <div class="stat-value">+16%</div>
                  <div class="stat-label">vs 2026 SOTA</div>
                </div>
              </div>
            </section>
            
            <section class="pipeline-container">
              <h2 class="pipeline-title">15-Stage Retrieval Pipeline</h2>
              
              <div class="pipeline">
                <div class="stage-row">
                  <div class="stage" data-stage="1">
                    <div class="stage-number">1</div>
                    <div class="stage-icon">📥</div>
                    <div class="stage-name">Query</div>
                    <div class="stage-desc">Ingest & validate</div>
                  </div>
                  <div class="stage" data-stage="2">
                    <div class="stage-number">2</div>
                    <div class="stage-icon">🧹</div>
                    <div class="stage-name">Clean</div>
                    <div class="stage-desc">Normalize text</div>
                  </div>
                  <div class="stage" data-stage="3">
                    <div class="stage-number">3</div>
                    <div class="stage-icon">🔮</div>
                    <div class="stage-name">HyDE</div>
                    <div class="stage-desc">Generate doc</div>
                  </div>
                </div>
                
                <div class="connector"><span class="arrow">↓</span></div>
                
                <div class="stage-row">
                  <div class="stage" data-stage="4">
                    <div class="stage-number">4</div>
                    <div class="stage-icon">🔄</div>
                    <div class="stage-name">Expand</div>
                    <div class="stage-desc">Multi-query</div>
                  </div>
                  <div class="stage" data-stage="5">
                    <div class="stage-number">5</div>
                    <div class="stage-icon">🧬</div>
                    <div class="stage-name">Embed</div>
                    <div class="stage-desc">4096-dim vector</div>
                  </div>
                </div>
                
                <div class="connector"><span class="arrow">↓</span></div>
                
                <div class="stage-row">
                  <div class="stage" data-stage="6">
                    <div class="stage-number">6</div>
                    <div class="stage-icon">🔍</div>
                    <div class="stage-name">Search</div>
                    <div class="stage-desc">Vector + FTS</div>
                  </div>
                  <div class="stage" data-stage="7">
                    <div class="stage-number">7</div>
                    <div class="stage-icon">🔀</div>
                    <div class="stage-name">Merge</div>
                    <div class="stage-desc">RRF fusion</div>
                  </div>
                </div>
                
                <div class="connector"><span class="arrow">↓</span></div>
                
                <div class="gate-section">
                  <div class="gate-title">⚡ Dynamic Reranker Gate</div>
                  <div class="gate-logic">
                    <div class="gate-condition">
                      <div class="condition">σ > 0.08</div>
                      <div class="action">SKIP (confident)<br/>Latency: 298ms</div>
                    </div>
                    <div class="gate-condition">
                      <div class="condition">σ < 0.02</div>
                      <div class="action">SKIP (tied)<br/>Latency: 298ms</div>
                    </div>
                    <div class="gate-condition">
                      <div class="condition">0.02-0.08</div>
                      <div class="action">RUN (ambiguous)<br/>Latency: 626ms</div>
                    </div>
                  </div>
                </div>
                
                <div class="connector"><span class="arrow">↓</span></div>
                
                <div class="stage-row">
                  <div class="stage" data-stage="8">
                    <div class="stage-number">8</div>
                    <div class="stage-icon">🎯</div>
                    <div class="stage-name">Rerank</div>
                    <div class="stage-desc">Cross-encoder</div>
                  </div>
                  <div class="stage" data-stage="9">
                    <div class="stage-number">9</div>
                    <div class="stage-icon">🎨</div>
                    <div class="stage-name">MMR</div>
                    <div class="stage-desc">Diversity λ=0.9</div>
                  </div>
                  <div class="stage" data-stage="10">
                    <div class="stage-number">10</div>
                    <div class="stage-icon">🏷️</div>
                    <div class="stage-name">Weight</div>
                    <div class="stage-desc">Pool boost</div>
                  </div>
                </div>
                
                <div class="connector"><span class="arrow">↓</span></div>
                
                <div class="stage-row">
                  <div class="stage" data-stage="11">
                    <div class="stage-number">11</div>
                    <div class="stage-icon">⏰</div>
                    <div class="stage-name">Temporal</div>
                    <div class="stage-desc">Decay score</div>
                  </div>
                  <div class="stage" data-stage="12">
                    <div class="stage-number">12</div>
                    <div class="stage-icon">📊</div>
                    <div class="stage-name">Normalize</div>
                    <div class="stage-desc">[0, 1] scale</div>
                  </div>
                  <div class="stage" data-stage="13">
                    <div class="stage-number">13</div>
                    <div class="stage-icon">✂️</div>
                    <div class="stage-name">Limit</div>
                    <div class="stage-desc">Top-k cut</div>
                  </div>
                  <div class="stage" data-stage="14">
                    <div class="stage-number">14</div>
                    <div class="stage-icon">📤</div>
                    <div class="stage-name">Return</div>
                    <div class="stage-desc">To agent</div>
                  </div>
                </div>
              </div>
            </section>
            
            <section class="fusion-section">
              <h2 class="pipeline-title">Reciprocal Rank Fusion</h2>
              
              <div class="fusion-formula">
                <div class="formula-desc">Scale-invariant merging of vector and FTS results</div>
                <div class="formula">RRF(d) = Σ 1 / (k + rank(d))</div>
                <div class="formula-desc">k = 60 (smoothing constant) · Higher rank = more agreement</div>
              </div>
            </section>
            
            <section class="architecture">
              <h2 class="arch-title">Architecture</h2>
              
              <div class="arch-diagram">
                <div class="arch-box">
                  <div class="arch-label">OpenClaw Agent</div>
                  <ul class="arch-items">
                    <li>Calls memory_recall()</li>
                    <li>Pool isolation</li>
                    <li>Context injection</li>
                  </ul>
                </div>
                
                <div class="arrow-horizontal">→</div>
                
                <div class="arch-box highlight">
                  <div class="arch-label">Memory-Spark Plugin</div>
                  <ul class="arch-items">
                    <li>15-stage pipeline</li>
                    <li>LanceDB + Tantivy</li>
                    <li>Dynamic gating</li>
                    <li>Temporal decay</li>
                    <li>MMR diversity</li>
                  </ul>
                </div>
                
                <div class="arrow-horizontal">→</div>
                
                <div class="arch-box">
                  <div class="arch-label">Spark Backend</div>
                  <ul class="arch-items">
                    <li>Nemotron-8B embed</li>
                    <li>Rerank-1B v2</li>
                    <li>Super-120B LLM</li>
                    <li>GLM-OCR parsing</li>
                  </ul>
                </div>
              </div>
            </section>
            
            <footer class="footer">
              <div class="footer-links">
                <a href="https://github.com/exampleuser/memory-spark" class="footer-link">
                  <span>📦</span> GitHub
                </a>
                <a href="https://github.com/exampleuser/memory-spark/wiki" class="footer-link">
                  <span>📚</span> Wiki
                </a>
                <a href="https://github.com/exampleuser/memory-spark/blob/main/paper/memory-spark.pdf" class="footer-link">
                  <span>📄</span> Paper
                </a>
              </div>
            </footer>
            
            <div class="scroll-indicator" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</div>
            
            <script>
              const stages = document.querySelectorAll('.stage');
              const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry, index) => {
                  if (entry.isIntersecting) {
                    setTimeout(() => {
                      entry.target.classList.add('visible');
                    }, index * 100);
                  }
                });
              }, { threshold: 0.1 });
              
              stages.forEach(stage => observer.observe(stage));
              
              const scrollIndicator = document.querySelector('.scroll-indicator');
              window.addEventListener('scroll', () => {
                if (window.scrollY > 500) {
                  scrollIndicator.classList.add('visible');
                } else {
                  scrollIndicator.classList.remove('visible');
                }
              });
            </script>
          </body>
          </html>
          HTMLEOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
