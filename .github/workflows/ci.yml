name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ tests/

      - name: Format check
        run: npx prettier --check 'src/**/*.ts' 'tests/**/*.ts'

      - name: Run unit tests
        run: npm test

      - name: Coverage report
        run: |
          npx --yes c8 --reporter=text-summary --reporter=lcov npm test | tee coverage-summary.txt
          mkdir -p coverage
          cp coverage-summary.txt coverage/summary.txt

      - name: Run evaluation (mock mode)
        run: node --import tsx evaluation/run.ts --mock

      - name: Generate evaluation charts
        run: node --import tsx evaluation/charts.ts --results evaluation/results/latest.json

      - name: Upload coverage + evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: research-artifacts
          path: |
            coverage/
            coverage/lcov.info
            evaluation/results/
            docs/figures/
          if-no-files-found: warn

      - name: Dead code check
        run: npx knip
        continue-on-error: true
