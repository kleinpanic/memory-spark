name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ tests/

      - name: Format check
        run: npx prettier --check 'src/**/*.ts' 'tests/**/*.ts'

      - name: Run unit tests
        run: npm test

      - name: Dead code check
        run: npx knip
        continue-on-error: true
