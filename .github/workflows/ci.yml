name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  actions: read
  id-token: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # QUALITY GATE - Must pass before any merge
  # ═══════════════════════════════════════════════════════════════════════
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for SonarQube/analysis

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Static Analysis ─────────────────────────────────────────────────
      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src/ index.ts --max-warnings 20

      - name: Prettier format check
        run: npx prettier --check 'src/**/*.ts' 'tests/**/*.ts' 'evaluation/**/*.ts' 'index.ts'

      - name: Knip dead code analysis
        run: npx knip

      # ── Unit Tests with Coverage ────────────────────────────────────────
      - name: Unit tests
        run: npx vitest run --coverage --exclude 'tests/integration.test.ts' --exclude 'tests/pdf-parsers.test.ts'
        env:
          SKIP_INTEGRATION: "1"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

      # ── FTS Validation ───────────────────────────────────────────────────
      - name: FTS+WHERE validation
        run: npx tsx tests/fts-where-test.ts

  # ═══════════════════════════════════════════════════════════════════════
  # SECURITY SCAN - CodeQL + npm audit
  # ═══════════════════════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ═══════════════════════════════════════════════════════════════════════
  # BUILD VERIFICATION
  # ═══════════════════════════════════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════
  # DOCS VERIFICATION - Ensure LaTeX compiles
  # ═══════════════════════════════════════════════════════════════════════
  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    needs: quality
    # Only run on main branch pushes to save resources
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-science

      - name: Compile LaTeX paper
        run: |
          cd paper
          pdflatex -interaction=nonstopmode memory-spark.tex || true
          pdflatex -interaction=nonstopmode memory-spark.tex

      - name: Upload paper PDF
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper/memory-spark.pdf
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════
