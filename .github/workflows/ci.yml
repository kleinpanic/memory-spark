name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src/ index.ts --max-warnings 20

      - name: Prettier format check
        run: npx prettier --check 'src/**/*.ts' 'tests/**/*.ts' 'evaluation/**/*.ts' 'index.ts'

      - name: Knip dead code analysis
        run: npx knip

      - name: Unit tests
        run: npx vitest run --exclude 'tests/integration.test.ts' --exclude 'tests/pdf-parsers.test.ts'
        env:
          SKIP_INTEGRATION: "1"

      - name: FTS+WHERE validation
        run: npx tsx tests/fts-where-test.ts

  # ── Integration tests (requires DGX Spark on local network) ────────────
  # These tests hit real GPU inference endpoints and are NOT runnable on
  # GitHub-hosted runners. Run locally: npx vitest run tests/integration.test.ts
  #
  # PDF tests require pdftotext (poppler-utils) which is not installed on
  # GitHub runners by default.

  benchmark:
    name: Benchmark (requires Spark)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Benchmark job requires Spark access — only runs on main branch push
      # In self-hosted runner with Spark access, uncomment:
      # - name: Run retrieval benchmark
      #   run: npx tsx evaluation/benchmark.ts --tier 1
      #   env:
      #     SPARK_HOST: ${{ secrets.SPARK_HOST }}
      #     SPARK_BEARER_TOKEN: ${{ secrets.SPARK_BEARER_TOKEN }}

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: evaluation/results/
          if-no-files-found: warn
