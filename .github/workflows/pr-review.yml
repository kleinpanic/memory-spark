name: PR Auto-Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # AUTO-LABEL - Label PRs based on file changes
  # ═══════════════════════════════════════════════════════════════════════
  label:
    name: Auto-Label PR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            src/**/*.ts
            tests/**/*.ts
            paper/**
            docs/**
            .github/**
            package.json

      - name: Label based on changes
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = '${{ steps.changed-files.outputs.all_changed_files }}'.split(' ');
            const labels = new Set();
            
            // Code changes
            if (changedFiles.some(f => f.startsWith('src/'))) {
              labels.add('code');
              if (changedFiles.some(f => f.includes('recall.ts'))) labels.add('pipeline');
              if (changedFiles.some(f => f.includes('rerank'))) labels.add('reranker');
              if (changedFiles.some(f => f.includes('storage'))) labels.add('storage');
              if (changedFiles.some(f => f.includes('embed'))) labels.add('embeddings');
            }
            
            // Test changes
            if (changedFiles.some(f => f.startsWith('tests/'))) {
              labels.add('tests');
            }
            
            // Docs changes
            if (changedFiles.some(f => f.startsWith('docs/') || f.startsWith('paper/'))) {
              labels.add('documentation');
            }
            
            // CI/CD changes
            if (changedFiles.some(f => f.startsWith('.github/'))) {
              labels.add('ci-cd');
            }
            
            // Dependencies
            if (changedFiles.some(f => f === 'package.json' || f === 'package-lock.json')) {
              labels.add('dependencies');
            }
            
            // Add labels
            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: Array.from(labels)
              });
            }

  # ═══════════════════════════════════════════════════════════════════════
  # SIZE CHECK - Warn on large PRs
  # ═══════════════════════════════════════════════════════════════════════
  size-check:
    name: Check PR Size
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR stats
        id: stats
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const changedFiles = pr.changed_files || 0;
            const total = additions + deletions;
            
            let size = 'small';
            if (total > 500) size = 'large';
            else if (total > 100) size = 'medium';
            
            return { additions, deletions, changedFiles, total, size };

      - name: Comment on large PRs
        if: fromJson(steps.stats.outputs.result).size == 'large'
        uses: actions/github-script@v7
        with:
          script: |
            const stats = ${{ steps.stats.outputs.result }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⚠️ **Large PR Detected**
              
              This PR is quite large (${stats.total} lines changed across ${stats.changedFiles} files).
              
              Consider breaking it into smaller PRs for easier review:
              - ✅ Smaller PRs are reviewed faster
              - ✅ Easier to identify bugs
              - ✅ Safer to revert if needed
              
              If this is intentional (refactor, major feature), feel free to ignore.`
            });

      - name: Add size label
        uses: actions/github-script@v7
        with:
          script: |
            const stats = ${{ steps.stats.outputs.result }};
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [`size/${stats.size}`]
            });

  # ═══════════════════════════════════════════════════════════════════════
  # QUALITY PREVIEW - Show quality gate status
  # ═══════════════════════════════════════════════════════════════════════
  quality-preview:
    name: Quality Preview
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Quick type check
        run: npm ci && npx tsc --noEmit --pretty 2>&1 | head -50 || true
        continue-on-error: true

      - name: Comment quality status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🔍 Quality Preview
            
              The full CI pipeline is running. Expected checks:
              
              | Check | Status |
              |-------|--------|
              | TypeScript | 🔄 Running |
              | ESLint | 🔄 Running |
              | Tests | 🔄 Running |
              | Coverage | 🔄 Running |
              
              Check the [CI workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`
            });
