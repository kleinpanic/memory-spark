<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="memory-spark chart">
  <defs><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style></defs>
  <rect width="800" height="500" fill="#0d1117"/>
  <rect x="10" y="10" width="780" height="480" rx="12" fill="#161b22" stroke="#30363d"/>
  <text x="40" y="48" fill="#c9d1d9" font-size="24" font-weight="700">Reranker Gate Decisions (GATE-A)</text>
  <text x="40" y="70" fill="#8b949e" font-size="14">SciFact, 300 queries — 78% of queries skip reranking</text>

  <!-- Skip: Confident (green) -->
  <path d="M 300 250 L 300 70 A 180 180 0 1 1 123.2 216.3 Z" fill="#3fb950" opacity="0.85"/>
  <!-- Skip: Tied (yellow) -->
  <path d="M 300 250 L 123.2 216.3 A 180 180 0 0 1 124.8 208.9 Z" fill="#d29922" opacity="0.85"/>
  <!-- Fire (red) -->
  <path d="M 300 250 L 124.8 208.9 A 180 180 0 0 1 300 70 Z" fill="#f85149" opacity="0.85"/>

  <!-- Center label -->
  <circle cx="300" cy="250" r="60" fill="#161b22"/>
  <text x="300" y="245" text-anchor="middle" fill="#c9d1d9" font-size="28" font-weight="700">78%</text>
  <text x="300" y="268" text-anchor="middle" fill="#8b949e" font-size="14">Skipped</text>

  <!-- Legend -->
  <rect x="550" y="150" width="20" height="20" rx="3" fill="#3fb950"/>
  <text x="580" y="166" fill="#c9d1d9" font-size="14">Skip: Confident (234)</text>
  <rect x="550" y="185" width="20" height="20" rx="3" fill="#d29922"/>
  <text x="580" y="201" fill="#c9d1d9" font-size="14">Skip: Tied (2)</text>
  <rect x="550" y="220" width="20" height="20" rx="3" fill="#f85149"/>
  <text x="580" y="236" fill="#c9d1d9" font-size="14">Reranker Fired (64)</text>

  <text x="550" y="280" fill="#8b949e" font-size="12">σ > 0.08 → skip (confident)</text>
  <text x="550" y="298" fill="#8b949e" font-size="12">σ &lt; 0.02 → skip (tied)</text>
  <text x="550" y="316" fill="#8b949e" font-size="12">0.02 ≤ σ ≤ 0.08 → fire</text>
</svg>