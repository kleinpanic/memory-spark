        <text x="1012.12" y="477.72" fill="#c9d1d9" font-size="18">0.832</text>
      

        <text x="256" y="537.72" fill="#c9d1d9" text-anchor="end" font-size="20">Vanilla Retrieval</text>
        <rect x="270" y="510" width="293.54" height="42" rx="6" fill="#f85149" opacity="0.9"/>
