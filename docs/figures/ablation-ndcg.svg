<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" role="img" aria-label="memory-spark chart">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </defs>
  <rect x="0" y="0" width="1200" height="640" fill="#0d1117"/>
  <rect x="12" y="12" width="1176" height="616" rx="12" fill="#161b22" stroke="#30363d"/>
  
    <text x="40" y="58" fill="#c9d1d9" font-size="30" font-weight="700">Ablation Study: NDCG@10 by Component</text>
    <text x="40" y="84" fill="#8b949e" font-size="16">Full pipeline vs component removals</text>
    
        <line x1="270" x2="270" y1="70" y2="600" stroke="#30363d" stroke-width="1"/>
        <text x="270" y="624" text-anchor="middle" fill="#8b949e" font-size="14">0.0</text>
      

        <line x1="446" x2="446" y1="70" y2="600" stroke="#30363d" stroke-width="1"/>
        <text x="446" y="624" text-anchor="middle" fill="#8b949e" font-size="14">0.2</text>
      

        <line x1="622" x2="622" y1="70" y2="600" stroke="#30363d" stroke-width="1"/>
        <text x="622" y="624" text-anchor="middle" fill="#8b949e" font-size="14">0.4</text>
      

        <line x1="798" x2="798" y1="70" y2="600" stroke="#30363d" stroke-width="1"/>
        <text x="798" y="624" text-anchor="middle" fill="#8b949e" font-size="14">0.6</text>
      

        <line x1="974" x2="974" y1="70" y2="600" stroke="#30363d" stroke-width="1"/>
