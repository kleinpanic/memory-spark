        <text x="256" y="117.72" fill="#c9d1d9" text-anchor="end" font-size="20">Full Pipeline</text>
        <rect x="270" y="90" width="782.75" height="42" rx="6" fill="#3fb950" opacity="0.9"/>
        <text x="1062.75" y="117.72" fill="#c9d1d9" font-size="18">0.889</text>
      

        <text x="256" y="177.72" fill="#c9d1d9" text-anchor="end" font-size="20">- Rerank</text>
        <rect x="270" y="150" width="710.84" height="42" rx="6" fill="#58a6ff" opacity="0.9"/>
        <text x="990.84" y="177.72" fill="#c9d1d9" font-size="18">0.808</text>
      

        <text x="256" y="237.72" fill="#c9d1d9" text-anchor="end" font-size="20">- Temporal Decay</text>
        <rect x="270" y="210" width="637.23" height="42" rx="6" fill="#58a6ff" opacity="0.9"/>
        <text x="917.23" y="237.72" fill="#c9d1d9" font-size="18">0.724</text>
      

        <text x="256" y="297.72" fill="#c9d1d9" text-anchor="end" font-size="20">- Hybrid FTS</text>
        <rect x="270" y="270" width="704.89" height="42" rx="6" fill="#58a6ff" opacity="0.9"/>
        <text x="984.89" y="297.72" fill="#c9d1d9" font-size="18">0.801</text>
      

        <text x="256" y="357.72" fill="#c9d1d9" text-anchor="end" font-size="20">- Quality Filter</text>
        <rect x="270" y="330" width="710.63" height="42" rx="6" fill="#58a6ff" opacity="0.9"/>
        <text x="990.63" y="357.72" fill="#c9d1d9" font-size="18">0.808</text>
      

        <text x="256" y="417.72" fill="#c9d1d9" text-anchor="end" font-size="20">- Contextual Prefix</text>
